name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta]

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
      - name: Clippy
        # Beta frequently ships new lints that are not yet stable policy.
        # Do not let a beta-only lint block merge; stable remains the hard gate.
        continue-on-error: ${{ matrix.rust == 'beta' }}
        run: cargo clippy -- -A clippy::empty_line_after_doc_comments
      - name: Format check
        run: cargo fmt --check
